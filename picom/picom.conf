### Fading ###
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;

### Transparency / Opacity ###
inactive-opacity = 0.6;
frame-opacity = 0.7;
inactive-opacity-override = false;
active-opacity = 0.7
opacity-rule = [
    "100:class_g = 'code-oss'",
	"100:class_g = 'Vmware'",
	"100:class_g = 'Inkscape'",
    "100:class_g = 'steam'",
    "100:class_g = 'calibre'",
    "100:class_g = 'obsidian'",
	"100:class_g = 'discord'",
	"100:class_g = 'Vmplayer'",
	"100:class_g = 'scrcpy'",
	"100:class_g = 'firefox'",
	"100:class_g = 'Brave-browser'",
	"100:class_g = 'Gimp'",
	"100:class_g = 'Eog'",
	"100:class_g = 'Vlc'",
	"100:class_g = 'feh'",
	"100:class_g = 'Tetris'",
    "100:class_g = 'Snake Game'",
	"100:class_g = 'Minecraft* 1.21.11'",
	"100:class_g = 'Google-chrome'",
    "100:class_g = 'libresprite'",
]

### Corners ###
corner-radius = 9
rounded-corners-exclude = [
  #"window_type = 'dock'",
  "window_type = 'desktop'"
];

### Background-Blurring ###
blur-method = "dual_kawase"
blur-size = 5
blur-strength = 3
blur-background = false
blur-kern = "3x3box";
blur-background-exclude = [
  "class_g = 'Conky'",
  "name *= 'rect-overlay'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

### General Settings ###
backend = "glx";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;
log-level = "warn";
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.75; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.8; }
  dropdown_menu = { opacity = 0.8; }
};
